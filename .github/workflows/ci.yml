name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  zig:
    name: Zig 0.15.2
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run CI checks
        run: zig build ci
